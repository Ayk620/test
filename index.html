<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Birthday Cake</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #ffd6e7, #ffeef5, #ffcce0);
    font-family: 'Poppins', sans-serif;
}

/* CAKE */
.cake {
    position: absolute;
    width: 250px;
    height: 200px;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.layer {
    position: absolute;
    width: 250px;
    height: 100px;
    border-radius: 50%;
    background-color: #ff69b4;
    box-shadow: 0 4px #ff85c1, 0 8px #ff4da6;
}

.layer-top { top: 0; }
.layer-middle { top: 33px; }
.layer-bottom { top: 66px; }

.icing {
    top: 2px;
    left: 5px;
    width: 240px;
    height: 90px;
    border-radius: 50%;
    background: #fff0f6;
}

/* STRAWBERRIES */
.strawberry {
    position: absolute;
    width: 18px;
    height: 22px;
    background: red;
    border-radius: 50%;
    top: -10px;
}
.strawberry::before {
    content: "";
    position: absolute;
    top: -5px;
    left: 3px;
    width: 12px;
    height: 6px;
    background: green;
    border-radius: 50%;
}

/* CANDLE */
.candle {
    background: #ff3366;
    width: 16px;
    height: 50px;
    border-radius: 8px;
    position: absolute;
    left: 50%;
    top: -20px;
    transform: translateX(-50%);
}

#flame {
    position: absolute;
    width: 15px;
    height: 30px;
    background: orange;
    border-radius: 50%;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    animation: flicker 1s infinite;
}

@keyframes flicker {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.2); }
    100% { transform: translateX(-50%) scale(1); }
}

/* TEXT */
.message {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: #ff4da6;
    font-weight: bold;
    opacity: 0;
    transition: 1s;
}

.subtext {
    font-size: 20px;
    color: #ff66a3;
}

/* FLOATING HEARTS */
.heart {
    position: absolute;
    color: pink;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-600px); opacity: 0; }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.4.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<div class="message" id="msg">
    Happy Birthday Baby 💖<br>
    <span class="subtext">I Love You</span>
</div>

<div class="cake">
    <div class="layer layer-bottom"></div>
    <div class="layer layer-middle"></div>
    <div class="layer layer-top"></div>
    <div class="icing"></div>

    <!-- STRAWBERRIES -->
    <div class="strawberry" style="left:40px;"></div>
    <div class="strawberry" style="left:90px;"></div>
    <div class="strawberry" style="left:140px;"></div>
    <div class="strawberry" style="left:190px;"></div>

    <div class="candle">
        <div id="flame"></div>
    </div>
</div>

<!-- MUSIC -->
<audio id="music" src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.wav"></audio>

<script>
const flame = document.getElementById("flame");
const msg = document.getElementById("msg");
const music = document.getElementById("music");

let blown = false;

navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
    const audioContext = new AudioContext();
    const analyser = audioContext.createAnalyser();
    const mic = audioContext.createMediaStreamSource(stream);

    mic.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    function detect() {
        if (blown) return;

        analyser.getByteFrequencyData(data);
        let avg = data.reduce((a,b)=>a+b)/data.length;

        if (avg > 100) {
            flame.style.opacity = 0;
            msg.style.opacity = 1;
            music.play();
            confetti();
            createHearts();
            blown = true;
        }

        requestAnimationFrame(detect);
    }

    detect();
});

/* HEART EFFECT */
function createHearts(){
    for(let i=0;i<20;i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.className = "heart";
        heart.style.left = Math.random()*100+"%";
        heart.style.top = "100%";
        document.body.appendChild(heart);
    }
}
</script>

</body>
</html>
