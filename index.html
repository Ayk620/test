<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Birthday Cake</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #ffd6e7, #ffeef5, #ffcce0);
    font-family: 'Poppins', sans-serif;
}

/* BLUR */
.bg-blur {
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(20px);
    background: rgba(255, 192, 203, 0.2);
    z-index: 0;
}

/* CAKE */
.cake {
    position: absolute;
    width: 260px;
    height: 260px;
    top: 58%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
}

/* PLATE */
.plate {
    position: absolute;
    width: 280px;
    height: 110px;
    background: #fff;
    border-radius: 50%;
    bottom: -25px;
    left: -10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

/* LAYERS */
.layer {
    position: absolute;
    width: 260px;
    height: 110px;
    border-radius: 50%;
    background: linear-gradient(to bottom, #ff85c1, #ff4da6);
    box-shadow: inset 0 -10px rgba(0,0,0,0.15), 0 10px 20px rgba(0,0,0,0.25);
}

.layer-top { top: 0; }
.layer-middle { top: 50px; }
.layer-bottom { top: 100px; }

/* ICING */
.icing {
    position: absolute;
    top: -10px;
    left: 8px;
    width: 244px;
    height: 95px;
    background: linear-gradient(to bottom, #fff0f6, #ffd6e7);
    border-radius: 50%;
    box-shadow: inset 0 4px 8px rgba(255,255,255,0.9),
                inset 0 -5px 8px rgba(0,0,0,0.15);
}

/* DRIPS */
.drip {
    position: absolute;
    width: 40px;
    height: 55px;
    background: #ffd6e7;
    border-radius: 20px;
}
.drip1 { left: 30px; top: 60px; }
.drip2 { left: 110px; top: 70px; }
.drip3 { left: 190px; top: 60px; }

/* STRAWBERRIES */
.strawberry {
    position: absolute;
    width: 20px;
    height: 25px;
    background: radial-gradient(circle at 30% 30%, #ff4d4d, #cc0000);
    border-radius: 50% 50% 45% 45%;
    top: -25px;
    box-shadow: 0 3px 5px rgba(0,0,0,0.2);
}
.strawberry::before {
    content: "";
    position: absolute;
    top: -6px;
    left: 4px;
    width: 12px;
    height: 6px;
    background: #2ecc71;
    border-radius: 50%;
}
.strawberry::after {
    content: "• • •";
    font-size: 6px;
    color: #fff;
    position: absolute;
    top: 8px;
    left: 3px;
}

/* CANDLE */
.candle {
    background: #ff3366;
    width: 16px;
    height: 55px;
    border-radius: 8px;
    position: absolute;
    left: 50%;
    top: -30px;
    transform: translateX(-50%);
}

#flame {
    position: absolute;
    width: 16px;
    height: 32px;
    background: orange;
    border-radius: 50%;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
    animation: flicker 1s infinite;
}
@keyframes flicker {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.2); }
    100% { transform: translateX(-50%) scale(1); }
}

/* MESSAGE */
.message {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: #ff4da6;
    font-weight: bold;
    opacity: 0;
    transition: 1s;
    z-index: 2;
}
.subtext {
    font-size: 20px;
    color: #ff66a3;
}

/* SPARKLES */
.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: sparkleFloat 6s linear infinite;
}
@keyframes sparkleFloat {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-600px); opacity: 0; }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.4.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<div class="bg-blur"></div>

<div class="message" id="msg">
    Happy Birthday Baby 💖<br>
    <span class="subtext">I Love You</span>
</div>

<div class="cake">
    <div class="plate"></div>

    <div class="layer layer-bottom"></div>
    <div class="layer layer-middle"></div>
    <div class="layer layer-top"></div>
    <div class="icing"></div>

    <div class="drip drip1"></div>
    <div class="drip drip2"></div>
    <div class="drip drip3"></div>

    <div class="strawberry" style="left:40px;"></div>
    <div class="strawberry" style="left:100px;"></div>
    <div class="strawberry" style="left:160px;"></div>
    <div class="strawberry" style="left:210px;"></div>

    <div class="candle">
        <div id="flame"></div>
    </div>
</div>

<audio id="music" src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.wav"></audio>

<script>
const flame = document.getElementById("flame");
const msg = document.getElementById("msg");
const music = document.getElementById("music");

let done = false;

/* CLICK BACKUP */
document.body.addEventListener("click", () => trigger("big"));

/* MIC DETECTION */
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
    const audioContext = new AudioContext();
    const analyser = audioContext.createAnalyser();
    const mic = audioContext.createMediaStreamSource(stream);

    mic.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    function detect() {
        if (done) return;

        analyser.getByteFrequencyData(data);
        let avg = data.reduce((a,b)=>a+b)/data.length;

        if (avg > 60 && avg < 120) {
            trigger("small");
        } else if (avg >= 120) {
            trigger("big");
        }

        requestAnimationFrame(detect);
    }

    detect();
})
.catch(() => {
    console.log("Mic blocked");
});

/* TRIGGER */
function trigger(type) {
    if (done) return;
    done = true;

    flame.style.opacity = 0;
    msg.style.opacity = 1;
    music.play();

    if (type === "small") {
        confetti({ particleCount: 80, spread: 60 });
    } else {
        confetti({ particleCount: 250, spread: 120 });
    }
}

/* SPARKLES */
function createSparkles() {
    for (let i = 0; i < 30; i++) {
        let s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = "100%";
        s.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(s);
    }
}
createSparkles();
</script>

</body>
</html>
