<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Birthday Cake</title>

<style>
body {
    background: linear-gradient(135deg, #ffd6e7, #ffeef5, #ffcce0);
    margin: 0;
    overflow: hidden;
    font-family: Arial;
}

/* BLUR */
.bg-blur {
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(15px);
    background: rgba(255,192,203,0.2);
}

/* CAKE */
.cake {
    position: absolute;
    width: 250px;
    height: 200px;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* PLATE */
.plate {
    width: 270px;
    height: 110px;
    position: absolute;
    bottom: -10px;
    left: -10px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

/* CAKE LAYERS (original style but pink) */
.layer {
    position: absolute;
    width: 250px;
    height: 100px;
    border-radius: 50%;
    background-color: #ff69b4;
    box-shadow:
        0 2px 0 #ff85c1,
        0 4px 0 #ff4da6,
        0 6px 0 #ff3399,
        0 8px 0 #ff1a8c,
        0 10px 0 #ff0080;
}
.layer-top { top: 0; }
.layer-middle { top: 33px; }
.layer-bottom { top: 66px; }

/* ICING */
.icing {
    top: 2px;
    left: 5px;
    background-color: #fff0f6;
    width: 240px;
    height: 90px;
    border-radius: 50%;
}

/* STRAWBERRIES */
.strawberry {
    position: absolute;
    width: 20px;
    height: 25px;
    background: red;
    border-radius: 50%;
    top: -15px;
}
.strawberry::before {
    content: "";
    position: absolute;
    top: -6px;
    left: 4px;
    width: 12px;
    height: 6px;
    background: green;
    border-radius: 50%;
}

/* CANDLE */
.candle {
    background: #7b020b;
    width: 16px;
    height: 50px;
    border-radius: 8px;
    position: absolute;
    left: 50%;
    top: -20px;
    transform: translateX(-50%);
}

#flame {
    position: absolute;
    background: orange;
    width: 15px;
    height: 30px;
    border-radius: 50%;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    animation: flicker 1s infinite;
}
@keyframes flicker {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.2); }
    100% { transform: translateX(-50%) scale(1); }
}

/* MESSAGE */
.message {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: #ff4da6;
    font-weight: bold;
    opacity: 0;
    transition: 1s;
}

/* SPARKLES */
.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: float 6s linear infinite;
}
@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-600px); opacity: 0; }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.4.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<div class="bg-blur"></div>

<div class="message" id="msg">
Happy Birthday Baby 💖<br>
I Love You
</div>

<div class="cake">
    <div class="plate"></div>

    <div class="layer layer-bottom"></div>
    <div class="layer layer-middle"></div>
    <div class="layer layer-top"></div>
    <div class="icing"></div>

    <!-- strawberries -->
    <div class="strawberry" style="left:40px;"></div>
    <div class="strawberry" style="left:90px;"></div>
    <div class="strawberry" style="left:140px;"></div>
    <div class="strawberry" style="left:190px;"></div>

    <div class="candle">
        <div id="flame"></div>
    </div>
</div>

<!-- Happy Birthday Song -->
<audio id="music" src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.wav"></audio>

<script>
const flame = document.getElementById("flame");
const msg = document.getElementById("msg");
const music = document.getElementById("music");

let done = false;

/* CLICK */
document.body.addEventListener("click", () => trigger("big"));

/* BLOW */
navigator.mediaDevices.getUserMedia({ audio: true })
.then(stream => {
    const audioContext = new AudioContext();
    const analyser = audioContext.createAnalyser();
    const mic = audioContext.createMediaStreamSource(stream);
    mic.connect(analyser);

    const data = new Uint8Array(analyser.frequencyBinCount);

    function detect() {
        if (done) return;

        analyser.getByteFrequencyData(data);
        let avg = data.reduce((a,b)=>a+b)/data.length;

        if (avg > 60 && avg < 120) trigger("small");
        else if (avg >= 120) trigger("big");

        requestAnimationFrame(detect);
    }

    detect();
});

/* TRIGGER */
function trigger(type) {
    if (done) return;
    done = true;

    flame.style.opacity = 0;
    msg.style.opacity = 1;
    music.play();

    if (type === "small") {
        confetti({ particleCount: 80, spread: 60 });
    } else {
        confetti({ particleCount: 250, spread: 120 });
    }
}

/* SPARKLES */
function createSparkles() {
    for (let i = 0; i < 30; i++) {
        let s = document.createElement("div");
        s.className = "sparkle";
        s.style.left = Math.random() * 100 + "%";
        s.style.top = "100%";
        document.body.appendChild(s);
    }
}
createSparkles();
</script>

</body>
</html>
